services:
  postgres-test:
    image: postgres:16
    environment:
      POSTGRES_USER: petcare
      POSTGRES_PASSWORD: petcare
      POSTGRES_DB: petcare_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petcare -d petcare_test"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data
