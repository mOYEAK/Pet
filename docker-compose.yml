services:
  postgres:
    image: postgres:16-alpine
    container_name: petcare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: petcare
      POSTGRES_PASSWORD: petcare
      POSTGRES_DB: petcare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: petcare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: petcare-api
    profiles:
      - app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DATABASE_URL: postgresql://petcare:petcare@postgres:5432/petcare?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: petcare-web
    profiles:
      - app
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
